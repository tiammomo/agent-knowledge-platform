name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate, build and integrate
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg17-bookworm@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
        env:
          POSTGRES_DB: akep
          POSTGRES_PASSWORD: akep-local-only
          POSTGRES_USER: akep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U akep -d akep"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          version: 0.11.16

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository checks
        run: pnpm check

      - name: Build distributable artifacts
        run: pnpm build

      - name: Run PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgres://akep:akep-local-only@localhost:5432/akep
        run: pnpm test:integration

      - name: Validate Compose configuration
        run: docker compose config --quiet
