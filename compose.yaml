services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg17-bookworm@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
    environment:
      POSTGRES_DB: akep
      POSTGRES_USER: akep
      POSTGRES_PASSWORD: akep-local-only
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akep -d akep"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - akep-postgres:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro

  core:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/core.Dockerfile
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      AUTH_MODE: development
      DATABASE_URL: postgres://akep:akep-local-only@postgres:5432/akep
      DATABASE_REQUIRED: "true"
      AKEP_PUBLIC_ORIGIN: http://localhost:${AKEP_WEB_PORT:-8080}
    ports:
      - "${AKEP_HOST_PORT:-3000}:3000"
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "${AKEP_WEB_PORT:-8080}:8080"
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/cache/nginx:size=32m,mode=0755
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/ui-health"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      core:
        condition: service_healthy

volumes:
  akep-postgres:
